<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Idiomas - Carteirinha</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            background: #ffffff;
            width: 90%;
            max-width: 380px;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .logo { font-weight: bold; color: #d32f2f; font-size: 1.1rem; margin-bottom: 5px; text-transform: uppercase; }
        h1 { font-size: 1.3rem; margin-bottom: 10px; line-height: 1.2; }
        .instrucao { color: #666; font-size: 0.9rem; margin-bottom: 25px; }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
        }

        input[type="text"]:focus { border-color: #d32f2f; }

        .btn-acessar {
            width: 100%;
            padding: 16px;
            background-color: #d32f2f;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .boas-vindas { font-size: 0.95rem; margin-bottom: 20px; }
        .boas-vindas b { color: #d32f2f; }

        .card-wrapper { perspective: 1000px; margin: 20px auto; }

        .card-3d {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        #imagemCarteirinha { width: 100%; }

        .assinatura-box {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px dashed #ddd;
        }

        .acoes { display: flex; justify-content: center; gap: 25px; margin-top: 30px; }

        .btn-circulo {
            width: 55px; height: 55px;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .download { background-color: #28a745; }
        .sair { background-color: #444; }
    </style>
</head>
<body>

<div id="tela-pesquisa" class="container">
    <div class="logo">Smart Idiomas</div>
    <h1>Carteirinha estudantil digital</h1>
    <p class="instrucao">
        Digite seu nome completo<br>
        <small>Ex: Carlos Augusto</small>
    </p>
    
    <input type="text" id="nomeInput" placeholder="Seu nome completo">
    <button class="btn-acessar" onclick="entrar()">Acessar Carteirinha</button>
</div>

<div id="tela-carteirinha" class="container" style="display: none;">
    <p class="boas-vindas"><b id="displayNome"></b></p>
    
    <div class="card-wrapper">
        <div class="card-3d">
            <img id="imagemCarteirinha" src="">
        </div>
    </div>

    <div class="acoes">
        <a id="downloadLink" href="" download>
            <button class="btn-circulo download"><i class="fas fa-arrow-down"></i></button>
        </a>
        <button class="btn-circulo sair" onclick="voltar()"><i class="fas fa-times"></i></button>
    </div>
</div>

<script>
function entrar() {
    const nome = document.getElementById('nomeInput').value.trim();

    if (!nome) {
        alert("Digite seu nome.");
        return;
    }

    // 🔥 PADRÃO CORRETO
    const nomePadrao = nome
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, "");

    const caminho = `fotos/${nomePadrao}.png`;

    const img = new Image();
    img.src = caminho;

    img.onload = function() {
        document.getElementById('displayNome').innerText = nome;
        document.getElementById('imagemCarteirinha').src = caminho;
        document.getElementById('downloadLink').href = caminho;

        document.getElementById('tela-pesquisa').style.display = 'none';
        document.getElementById('tela-carteirinha').style.display = 'block';
    };

    img.onerror = function() {
        alert("Aluno não encontrado.");
    };
}

function voltar() {
    location.reload();
}
</script>

</body>
</html>
